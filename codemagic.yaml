# Codemagic: iOS シミュレータでアプリを実際に起動し、画面と Sleep mix
# （Drone 4 声 + ピンクノイズ + Grain + reverb）の WAV をアーティファクトとして Web UI から確認できるようにする。
#
# 開発環境が Windows のため Xcode/シミュレータをローカルで動かせない。
# GitHub Actions の iOS Build はコンパイル可否しか見ないので、ここでは
# 「実際に動かして UI/音を確かめる」を担う。
#
# 想定: Free tier の mac_mini_m2（M2 Apple silicon, 500 min/月）。
# 1 ラン 5 分未満を目安にしている。

workflows:
  ios-simulator-preview:
    name: iOS Simulator Preview (UI + 音)
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      # Xcode 16 系を使う（pbxproj が objectVersion 77 + PBXFileSystemSynchronizedRootGroup のため）。
      # Codemagic はメジャー版指定を受け付けないので具体的な patch を固定する。
      # イメージから 16.4 が消えたら次の 16.x（16.5 等）に差し替える運用。
      xcode: 16.4
      vars:
        SCHEME: "HypnoctoneEngine"
        BUNDLE_ID: "com.hypnoctone.HypnoctoneEngine"
        DERIVED_DATA: "build"
        ARTIFACTS_DIR: "artifacts"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Show toolchain
        script: |
          set -euo pipefail
          xcodebuild -version
          xcode-select -p
          xcrun simctl --version || true

      - name: Build for iOS Simulator
        script: |
          set -euo pipefail
          set -o pipefail
          xcodebuild build \
            -project HypnoctoneEngine.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO

      - name: Pick & boot simulator
        script: |
          set -euo pipefail
          # シミュレータ選択方針: iPhone 16 系を最優先、無ければ最新 iOS runtime の任意の iPhone。
          # 画面サイズや UI の見え方を安定させるため決定的に選ぶ。
          DEVICE_UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)['devices']
          cands = []
          for runtime, lst in data.items():
              if 'SimRuntime.iOS' not in runtime:
                  continue
              for dev in lst:
                  if dev.get('isAvailable') and 'iPhone' in dev.get('name', ''):
                      cands.append((runtime, dev))
          assert cands, 'no available iPhone simulator'
          preferred = [c for c in cands if 'iPhone 16' in c[1]['name']]
          chosen = preferred[0] if preferred else sorted(cands, key=lambda c: c[0], reverse=True)[0]
          print(chosen[1]['udid'])
          ")
          echo "Booting simulator: $DEVICE_UDID"
          xcrun simctl boot "$DEVICE_UDID" || true
          xcrun simctl bootstatus "$DEVICE_UDID" -b
          # 後続ステップで使うため Codemagic の env ファイルへ書き出し
          echo "DEVICE_UDID=$DEVICE_UDID" >> "$CM_ENV"

      - name: Install app
        script: |
          set -euo pipefail
          APP_PATH=$(find "$DERIVED_DATA/Build/Products" -name "$SCHEME.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "App bundle not found under $DERIVED_DATA/Build/Products"
            exit 1
          fi
          echo "Installing: $APP_PATH"
          xcrun simctl install "$DEVICE_UDID" "$APP_PATH"

          # Task 24/25: 生成された Info.plist の fail-loud 確認。
          #   Task 24: UIBackgroundModes 配列に "audio" が入っていること
          #   Task 25: CFBundleIconName = AppIcon、UILaunchScreen.UIColorName = LaunchBackground
          # Xcode 16 の auto plist 生成で各 INFOPLIST_KEY_* が反映されているはず。
          # plutil -extract で値を取得し、想定値と異なれば build を落とす。
          INFO_PLIST="$APP_PATH/Info.plist"
          if [ ! -f "$INFO_PLIST" ]; then
            echo "FAIL: Info.plist が見つかりません: $INFO_PLIST"
            exit 1
          fi

          echo "--- Generated Info.plist (Task 24/25 関連キーを目視確認) ---"
          plutil -p "$INFO_PLIST" \
            | grep -A 3 -E "UIBackgroundModes|CFBundleIdentifier|CFBundleIconName|UILaunchScreen" \
            || true

          # Task 25 fail-loud: CFBundleIconName / UILaunchScreen.UIColorName を厳密検証
          # 注: actool 出力次第で AppIcon 名が top-level CFBundleIconName ではなく
          # CFBundleIcons.CFBundlePrimaryIcon.CFBundleIconName 側に入る場合がある。
          # 両方を見て、どちらかが "AppIcon" であれば OK とする (Codex review 反映)。
          ICON_NAME="$(plutil -extract CFBundleIconName raw -o - "$INFO_PLIST" 2>/dev/null || true)"
          if [ -z "$ICON_NAME" ]; then
            ICON_NAME="$(plutil -extract CFBundleIcons.CFBundlePrimaryIcon.CFBundleIconName raw -o - "$INFO_PLIST" 2>/dev/null || true)"
          fi
          if [ "$ICON_NAME" != "AppIcon" ]; then
            echo "FAIL: CFBundleIconName='$ICON_NAME' (expected 'AppIcon')"
            echo "  → ASSETCATALOG_COMPILER_APPICON_NAME が反映されていない可能性"
            exit 1
          fi
          echo "OK: CFBundleIconName = AppIcon"

          LS_COLOR="$(plutil -extract UILaunchScreen.UIColorName raw -o - "$INFO_PLIST" 2>/dev/null || true)"
          if [ "$LS_COLOR" != "LaunchBackground" ]; then
            echo "FAIL: UILaunchScreen.UIColorName='$LS_COLOR' (expected 'LaunchBackground')"
            echo "  → INFOPLIST_KEY_UILaunchScreen_BackgroundColor が UIColorName へ展開されていない"
            echo "  → 対処: 明示的な Info.plist を追加し UILaunchScreen dict を直書きする必要"
            exit 1
          fi
          echo "OK: UILaunchScreen.UIColorName = LaunchBackground"

          echo "--- App bundle 内のコンパイル済み Asset Catalog (Assets.car) 確認 ---"
          if [ -f "$APP_PATH/Assets.car" ]; then
            echo "Assets.car: $(stat -f %z "$APP_PATH/Assets.car") bytes"
            # AppIcon が actool で展開され、各 size の png が bundle に直置きされる場合は
            # それも一覧化（Xcode 16 の universal single-size 動作で生成される想定）
            find "$APP_PATH" -maxdepth 1 -name 'AppIcon*' -print
          else
            echo "FAIL: Assets.car が見つかりません: $APP_PATH/Assets.car"
            echo "  → Assets.xcassets が actool に拾われていない可能性"
            exit 1
          fi

      - name: Capture video + screenshots + WAV (v3 offline render)
        script: |
          set -euo pipefail
          mkdir -p "$ARTIFACTS_DIR"

          # ---- 実行開始時刻マーカー（crash log を実行以降に絞るため） ----
          touch -t "$(date '+%Y%m%d%H%M.%S')" "$ARTIFACTS_DIR/.start-marker"

          # ---- system log を最初から拾う（真っ白原因の切り分け用） ----
          # アプリ本体に加え、起動失敗・watchdog・foreground 化失敗を見るため
          # SpringBoard / runningboardd / launchd / ReportCrash も拾う。
          xcrun simctl spawn "$DEVICE_UDID" log stream \
            --level=debug \
            --predicate 'processImagePath CONTAINS "HypnoctoneEngine" OR senderImagePath CONTAINS "HypnoctoneEngine" OR subsystem == "com.hypnoctone.HypnoctoneEngine" OR eventMessage CONTAINS "HypnoctoneEngine" OR process == "SpringBoard" OR process == "runningboardd" OR process == "launchd" OR process == "ReportCrash"' \
            > "$ARTIFACTS_DIR/syslog.log" 2>&1 &
          LOG_PID=$!

          # ---- 録画開始（v1 で音声が記録されないことを実証済み、UI 確認用） ----
          xcrun simctl io "$DEVICE_UDID" recordVideo --codec=h264 "$ARTIFACTS_DIR/preview.mp4" &
          REC_PID=$!

          # 失敗時にも録画・ログを確実に flush。
          cleanup() {
            xcrun simctl terminate "$DEVICE_UDID" "$BUNDLE_ID" >/dev/null 2>&1 || true
            if kill -0 "$REC_PID" >/dev/null 2>&1; then
              kill -SIGINT "$REC_PID" >/dev/null 2>&1 || true
              wait "$REC_PID" >/dev/null 2>&1 || true
            fi
            if kill -0 "$LOG_PID" >/dev/null 2>&1; then
              kill -SIGTERM "$LOG_PID" >/dev/null 2>&1 || true
              wait "$LOG_PID" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          # 録画・ログプロセスが立ち上がるのを待つ
          sleep 2

          # アプリ起動。SIMCTL_CHILD_ プレフィックスは simctl が剥がして子プロセスに環境変数として渡す。
          SIMCTL_CHILD_CI_AUTOSTART=1 \
            xcrun simctl launch --console "$DEVICE_UDID" "$BUNDLE_ID" \
            > "$ARTIFACTS_DIR/app-stdout.log" 2>&1 &
          LAUNCH_PID=$!

          # 描画ログ用ヘルパ: 「経過秒 / アプリ pid 生存？」
          # launchctl list は `PID Status Label` 形式。終了済みは PID が `-` になるので
          # PID が数値であることを保証してから取る。bundle id を regex でなく
          # 文字列包含で比較（`.` を任意文字扱いしない）。
          #
          # 注: `set -e + pipefail` 下では `awk '...exit}'` の early-exit で
          # `launchctl list` が SIGPIPE(141) を受け、script 全体が落ちる事例があった
          # （v7 ラン）。pipe 全体を `|| pid=""` で吸収して防御する。
          probe_app() {
            local label="$1"
            local pid
            pid=$(xcrun simctl spawn "$DEVICE_UDID" launchctl list 2>/dev/null \
              | awk -v b="$BUNDLE_ID" '$1 ~ /^[0-9]+$/ && index($3, b) > 0 {print $1; exit}') \
              || pid=""
            echo "[probe $label] app pid: ${pid:-<not running>}" | tee -a "$ARTIFACTS_DIR/probe.log"
          }

          # v3: AudioEngineController が offline render に切り替わり SIGABRT しない前提。
          #     cold start + handleCIAutostart の 1.5s 遅延 + WAV render（数百ms）が
          #     終わった頃合いで screenshot を撮る。
          sleep 5
          probe_app "t+5s"
          xcrun simctl io "$DEVICE_UDID" screenshot "$ARTIFACTS_DIR/01-after-render.png"

          sleep 3
          probe_app "t+8s"
          xcrun simctl io "$DEVICE_UDID" screenshot "$ARTIFACTS_DIR/02-stopped.png"

          sleep 3
          probe_app "t+11s"
          xcrun simctl io "$DEVICE_UDID" screenshot "$ARTIFACTS_DIR/03-late.png"

          # ---- WAV をアプリ sandbox から回収（terminate より前に取らないとアプリが消える等の事故を避ける） ----
          SANDBOX=$(xcrun simctl get_app_container "$DEVICE_UDID" "$BUNDLE_ID" data 2>/dev/null || true)
          echo "App sandbox: $SANDBOX" | tee -a "$ARTIFACTS_DIR/probe.log"
          if [ -n "$SANDBOX" ] && [ -f "$SANDBOX/Documents/sleep-mix.wav" ]; then
            cp "$SANDBOX/Documents/sleep-mix.wav" "$ARTIFACTS_DIR/sleep-mix.wav"
            echo "WAV copied to artifacts/" | tee -a "$ARTIFACTS_DIR/probe.log"
          else
            echo "WARNING: sleep-mix.wav not found in app sandbox" | tee -a "$ARTIFACTS_DIR/probe.log"
            ls -la "$SANDBOX/Documents/" 2>&1 | tee -a "$ARTIFACTS_DIR/probe.log" || true
          fi

          # 明示停止（trap でも回収されるが二重 kill は安全）
          xcrun simctl terminate "$DEVICE_UDID" "$BUNDLE_ID" || true
          sleep 1
          kill -SIGINT "$REC_PID" || true
          wait "$REC_PID" || true
          wait "$LAUNCH_PID" || true
          kill -SIGTERM "$LOG_PID" || true
          wait "$LOG_PID" || true

          # crash log 収集（範囲を広げて取り逃がしを減らす）
          mkdir -p "$ARTIFACTS_DIR/crash"

          # 1) simulator 内の SIMULATOR_SHARED_RESOURCES_DIRECTORY 配下
          CRASH_DIR=$(xcrun simctl getenv "$DEVICE_UDID" SIMULATOR_SHARED_RESOURCES_DIRECTORY 2>/dev/null || true)
          if [ -n "$CRASH_DIR" ] && [ -d "$CRASH_DIR/Library/Logs/CrashReporter" ]; then
            cp -R "$CRASH_DIR/Library/Logs/CrashReporter"/* "$ARTIFACTS_DIR/crash/" 2>/dev/null || true
          fi

          # 2) ホスト側 DiagnosticReports — 実行開始時刻以降の .ips / .crash 全部
          #    （HypnoctoneEngine 以外に SpringBoard/ReportCrash 等の関連も拾うため広めに）
          if [ -d "$HOME/Library/Logs/DiagnosticReports" ]; then
            find "$HOME/Library/Logs/DiagnosticReports" -type f \
              \( -name "*.ips" -o -name "*.crash" \) \
              -newer "$ARTIFACTS_DIR/.start-marker" \
              -exec cp {} "$ARTIFACTS_DIR/crash/" \; 2>/dev/null || true
          fi

          # 3) CoreSimulator の per-device ログ（起動失敗・foreground 化失敗の手がかり）
          if [ -d "$HOME/Library/Logs/CoreSimulator/$DEVICE_UDID" ]; then
            mkdir -p "$ARTIFACTS_DIR/crash/coresim"
            cp -R "$HOME/Library/Logs/CoreSimulator/$DEVICE_UDID/"* \
              "$ARTIFACTS_DIR/crash/coresim/" 2>/dev/null || true
          fi

          ls -la "$ARTIFACTS_DIR"
          echo "--- probe.log ---"
          cat "$ARTIFACTS_DIR/probe.log" || true
          echo "--- syslog head ---"
          head -200 "$ARTIFACTS_DIR/syslog.log" || true

      - name: "Install ffmpeg (for WAV inspection + reverb tail check)"
        script: |
          set -euo pipefail
          # Codemagic mac_mini-m2 イメージは ffmpeg/ffprobe が未プリインストール。
          # Task 17 で WAV 検査と reverb tail 検証が必須化されたため、ここで brew install する。
          # 既にインストール済みなら skip (将来のイメージ変更で同梱されたケースに対応)。
          if command -v ffmpeg >/dev/null 2>&1 && command -v ffprobe >/dev/null 2>&1; then
            echo "ffmpeg & ffprobe are already available; skipping install."
          else
            echo "Installing ffmpeg via Homebrew..."
            # quiet にしてログを抑える。エラー時は bash の set -e で fail する。
            brew install ffmpeg
          fi
          ffmpeg -version | head -1
          ffprobe -version | head -1

      - name: "Verify WAV (offline-rendered Sleep mix: 220Hz Drone + pink noise)"
        script: |
          set -euo pipefail
          # v3 の本命: AudioEngineController が manualRenderingMode で書き出した WAV を検査。
          # WAV が無ければ build 失敗扱いとする（offline render が正しく動いたかが本ステップの目的）。
          if ! command -v ffprobe >/dev/null 2>&1; then
            echo "ffprobe not available; skipping WAV inspection."
            exit 0
          fi
          WAV="$ARTIFACTS_DIR/sleep-mix.wav"
          if [ ! -s "$WAV" ]; then
            echo "ERROR: $WAV が無い、または空。offline render が失敗した可能性。"
            exit 1
          fi
          echo "--- ffprobe streams (WAV) ---"
          ffprobe -v error -show_format -show_streams "$WAV"
          # 妥当性チェック: 44.1kHz / 2ch (stereo) / 約 4 秒 を期待
          DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "$WAV")
          SAMPLE_RATE=$(ffprobe -v error -select_streams a:0 -show_entries stream=sample_rate -of csv=p=0 "$WAV")
          CHANNELS=$(ffprobe -v error -select_streams a:0 -show_entries stream=channels -of csv=p=0 "$WAV")
          echo "duration=$DURATION sample_rate=$SAMPLE_RATE channels=$CHANNELS"
          FAIL=0
          if [ "$SAMPLE_RATE" != "44100" ]; then
            echo "ERROR: sample rate が想定 (44100) と違う: $SAMPLE_RATE"
            FAIL=1
          fi
          if [ "$CHANNELS" != "2" ]; then
            echo "ERROR: チャネル数が想定 (2 = stereo) と違う: $CHANNELS"
            FAIL=1
          fi
          # Task 17 で WAV を 18s に延長（reverb tail 区間 2.0s を末尾に確保するため）。
          # 構造: fade-in 0.8s + 定常 14.4s + fade-out 0.8s + reverb tail 2.0s = 18.0 秒。
          # 実際は totalFrames に + frameCapacity の余裕を足しているので約 18.09s 出る想定。
          # tail 区間 (16.0〜17.5s) を検査するため最低でも 17.9s を要求。
          # awk で float 比較（bash の test では浮動小数比較ができない）。
          DURATION_OK=$(awk -v d="$DURATION" 'BEGIN { print (d+0 >= 17.9) ? 1 : 0 }')
          if [ "$DURATION_OK" != "1" ]; then
            echo "ERROR: duration が短すぎる (期待 >= 17.9s, 実際 $DURATION s)"
            FAIL=1
          fi
          # ---- L/R それぞれが無音でない、かつ L != R であることを確認 ----
          # channels=2 のチェックだけだと「両 ch とも信号がある」「L/R が同一でない」を
          # 検出できない。ffmpeg の pan filter で L / R / (L-R) を s16le raw に変換して
          # max-abs を測る。Task 10 の detune / 独立 PRNG が効いていれば DIFF は十分大きい。
          measure_max_abs() {
            local pan_expr="$1"
            ffmpeg -hide_banner -nostats -loglevel error \
              -i "$WAV" -af "pan=mono|$pan_expr" -f s16le -acodec pcm_s16le - 2>/dev/null \
              | od -A n -t d2 -v \
              | awk 'BEGIN { m=0 } { for (i=1;i<=NF;i++) { v=$i; if (v<0) v=-v; if (v>m) m=v } } END { print m+0 }'
          }
          L_MAX=$(measure_max_abs "c0=c0")
          R_MAX=$(measure_max_abs "c0=c1")
          DIFF_MAX=$(measure_max_abs "c0=0.5*c0-0.5*c1")
          echo "stereo check: L_MAX=$L_MAX  R_MAX=$R_MAX  DIFF_MAX=$DIFF_MAX"
          # しきい値: L/R がそれぞれ最低 500（s16 で 0.015）、L-R 差分が 100（0.003）以上。
          # 500 は Drone fade-in 終端や Noise だけでも余裕で超える水準。
          # 100 は detune ビート + 独立 PRNG ノイズが効いていれば必ず超える。
          if [ "${L_MAX:-0}" -lt 500 ]; then
            echo "ERROR: L チャネルが想定より弱い (max=$L_MAX, 期待 >= 500)"
            FAIL=1
          fi
          if [ "${R_MAX:-0}" -lt 500 ]; then
            echo "ERROR: R チャネルが想定より弱い (max=$R_MAX, 期待 >= 500)"
            FAIL=1
          fi
          if [ "${DIFF_MAX:-0}" -lt 100 ]; then
            echo "ERROR: L/R 差分が小さすぎる (max=$DIFF_MAX, 期待 >= 100)。stereo 化が機能していない可能性。"
            FAIL=1
          fi
          if [ "$FAIL" = "1" ]; then
            exit 1
          fi
          echo "OK: sleep-mix.wav は 44.1kHz / stereo (2ch) / >= 17.9s / L≠R の妥当な WAV です。"

      - name: "Verify reverb tail (Task 17: post-fade-out residual energy)"
        script: |
          set -euo pipefail
          # Task 17: mainMixer → AVAudioUnitReverb → output グラフの reverb tail を検証する。
          # WAV 構造: 0〜0.8s fade-in / 0.8〜15.2s 定常 / 15.2〜16.0s fade-out / 16.0〜18.0s tail。
          # → 16.0〜17.5s 区間は「素の信号は 0、reverb の残響のみ」が記録されているはず。
          # reverb が機能していれば tail RMS は十分に観測可能な値 (>= 30, s16 で 0.001)。
          # reverb が機能していなければ完全無音 (tail RMS ≈ 0) になるので、しきい値で判定できる。
          # Task 17 検査は CI の信頼性を保つため、ffmpeg/ffprobe が無い場合は fail にする。
          # (前段の WAV 検査ステップとの整合よりも、reverb tail 観測が確実に行われることを優先)
          if ! command -v ffprobe >/dev/null 2>&1; then
            echo "ERROR: ffprobe が見つからない。Task 17 の reverb tail 検査に必須。"
            exit 1
          fi
          if ! command -v ffmpeg >/dev/null 2>&1; then
            echo "ERROR: ffmpeg が見つからない。Task 17 の reverb tail 検査に必須。"
            exit 1
          fi
          WAV="$ARTIFACTS_DIR/sleep-mix.wav"
          if [ ! -s "$WAV" ]; then
            echo "ERROR: $WAV が見つからない。"
            exit 1
          fi

          # 指定区間の mono RMS (s16le 換算) を測る関数。
          # atrim_expr 例: "atrim=start=16:end=17.5,asetpts=PTS-STARTPTS"
          measure_rms_in_range() {
            local atrim_expr="$1"
            local pan_expr="$2"
            ffmpeg -hide_banner -nostats -loglevel error \
              -i "$WAV" -af "${atrim_expr},pan=mono|${pan_expr}" \
              -f s16le -acodec pcm_s16le - 2>/dev/null \
              | od -A n -t d2 -v \
              | awk 'BEGIN { sum=0; n=0 }
                     { for (i=1;i<=NF;i++) { v=$i+0; sum += v*v; n++ } }
                     END { if (n==0) print 0; else printf "%.1f\n", sqrt(sum/n) }'
          }

          # 定常区間 (10.0〜12.0s): fade-in 完了済み・fade-out 開始前。dry 信号 + reverb 込み。
          # tail 区間 (16.0〜17.5s): fade-out 完了済み。素信号は 0、reverb tail のみ。
          # 比較区間 (17.8〜18.0s): tail decay の末尾。tail RMS から更に減衰している想定。
          STEADY_RMS_L=$(measure_rms_in_range "atrim=start=10.0:end=12.0,asetpts=PTS-STARTPTS" "c0=c0")
          TAIL_RMS_L=$(measure_rms_in_range "atrim=start=16.0:end=17.5,asetpts=PTS-STARTPTS" "c0=c0")
          TAIL_RMS_R=$(measure_rms_in_range "atrim=start=16.0:end=17.5,asetpts=PTS-STARTPTS" "c0=c1")
          LATE_RMS_L=$(measure_rms_in_range "atrim=start=17.8:end=18.0,asetpts=PTS-STARTPTS" "c0=c0")
          echo "reverb-tail check: STEADY_RMS_L=$STEADY_RMS_L TAIL_RMS_L=$TAIL_RMS_L TAIL_RMS_R=$TAIL_RMS_R LATE_RMS_L=$LATE_RMS_L"

          FAIL=0
          # tail RMS が観測しきい値以上（reverb が機能している証拠）。
          # artifacts_021 の実測: L=59.0 / R=30.9 / STEADY_L=1286.9 (TAIL/STEADY = 4.6%)。
          # R がしきい値 30 とほぼ同値だったので 20 に緩める (s16 で 0.0006 = -64dB)。
          # 20 を割るなら reverb が機能していない (= 完全無音に近い) と確実に言える水準。
          TAIL_OK=$(awk -v r="$TAIL_RMS_L" 'BEGIN { print (r+0 >= 20.0) ? 1 : 0 }')
          if [ "$TAIL_OK" != "1" ]; then
            echo "ERROR: L チャネルの tail RMS が小さすぎる (期待 >= 20, 実際 $TAIL_RMS_L)。reverb が機能していない可能性。"
            FAIL=1
          fi
          TAIL_R_OK=$(awk -v r="$TAIL_RMS_R" 'BEGIN { print (r+0 >= 20.0) ? 1 : 0 }')
          if [ "$TAIL_R_OK" != "1" ]; then
            echo "ERROR: R チャネルの tail RMS が小さすぎる (期待 >= 20, 実際 $TAIL_RMS_R)。reverb が機能していない可能性。"
            FAIL=1
          fi
          # 比率条件: TAIL_L / STEADY_L >= 0.02 (2%)。outputVolume を変えても適応的に通る。
          # artifacts_021 実測 0.046 (4.6%) から余裕を見て 0.02 をしきい値に。
          RATIO_OK=$(awk -v t="$TAIL_RMS_L" -v s="$STEADY_RMS_L" \
            'BEGIN { print (s+0 > 0 && t/s >= 0.02) ? 1 : 0 }')
          if [ "$RATIO_OK" != "1" ]; then
            RATIO_VAL=$(awk -v t="$TAIL_RMS_L" -v s="$STEADY_RMS_L" \
              'BEGIN { if (s+0 > 0) printf "%.4f", t/s; else print "n/a" }')
            echo "ERROR: TAIL_RMS_L / STEADY_RMS_L が小さすぎる (期待 >= 0.02, 実際 $RATIO_VAL)。reverb 残響が定常レベル比で不十分。"
            FAIL=1
          fi
          # tail RMS は定常 RMS より小さいはず (reverb は減衰するので)。
          DECAY_OK=$(awk -v t="$TAIL_RMS_L" -v s="$STEADY_RMS_L" \
            'BEGIN { print (t+0 < s+0) ? 1 : 0 }')
          if [ "$DECAY_OK" != "1" ]; then
            echo "ERROR: tail RMS ($TAIL_RMS_L) が定常 RMS ($STEADY_RMS_L) より大きい。fade-out が機能していない可能性。"
            FAIL=1
          fi
          # tail 区間自体も末尾に向けて減衰しているはず (LATE が TAIL の 80% 未満)。
          # tail 検査区間 (16.0〜17.5s) の RMS よりさらに後 (17.8〜18.0s) で減衰していなければ
          # reverb の減衰が機能していない、または tail が打ち切られていない可能性。
          LATE_DECAY_OK=$(awk -v late="$LATE_RMS_L" -v tail="$TAIL_RMS_L" \
            'BEGIN { print (late+0 < (tail+0) * 0.8) ? 1 : 0 }')
          if [ "$LATE_DECAY_OK" != "1" ]; then
            echo "ERROR: 後半 RMS ($LATE_RMS_L) が tail RMS ($TAIL_RMS_L) の 80% 未満まで減衰していない。reverb decay が想定外。"
            FAIL=1
          fi
          if [ "$FAIL" = "1" ]; then
            exit 1
          fi
          echo "OK: fade-out 後の reverb tail が L/R 両 ch で観測 + 末尾減衰も確認 (Task 17)。"

      - name: "Verify GRAIN (Task 19: short windowed sine triggers in C#5/E5/F#5/A5 band group)"
        script: |
          set -euo pipefail
          # Task 19: GrainGenerator は高音域 4 候補 (C#5=554 / E5=659 / F#5=740 / A5=880 Hz) から
          # trigger 毎に uniform random で 1 つ選んで短い windowed サイン波を発火する。
          # PRNG seed・候補順・初期 offset が少し変われば「特定の 1 候補が検査区間に出ない」可能性
          # があるため、CI 検査は単一帯域ではなく **4 候補すべての帯域の集約** で判定する。
          # 各候補帯の MAX absolute サンプル値を測り、参照帯 (1200Hz, Drone 倍音 989/1320 の中間で
          # GRAIN 候補にも含まれない) の MAX と比較する。GRAIN が機能していれば
          # 候補帯のうち少なくとも 1 つは参照帯より明確に大きく、また合算 MAX も参照帯を大きく上回る。
          if ! command -v ffmpeg >/dev/null 2>&1; then
            echo "ERROR: ffmpeg が見つからない。Task 19 の GRAIN 検査に必須。"
            exit 1
          fi
          WAV="$ARTIFACTS_DIR/sleep-mix.wav"
          if [ ! -s "$WAV" ]; then
            echo "ERROR: $WAV が見つからない。"
            exit 1
          fi

          # 指定帯域 (bandpass) で steady 区間 (5.0〜14.0s) の MAX absolute s16le サンプルを測る。
          measure_max_in_band() {
            local center="$1"
            local width="$2"
            local channel="$3"  # "c0" (L) or "c1" (R)
            ffmpeg -hide_banner -nostats -loglevel error \
              -i "$WAV" \
              -af "atrim=start=5.0:end=14.0,asetpts=PTS-STARTPTS,pan=mono|c0=${channel},bandpass=f=${center}:w=${width}" \
              -f s16le -acodec pcm_s16le - 2>/dev/null \
              | od -A n -t d2 -v \
              | awk 'BEGIN { m=0 } { for (i=1;i<=NF;i++) { v=$i; if (v<0) v=-v; if (v>m) m=v } } END { print m+0 }'
          }

          # bandwidth 60Hz は grain 60ms の主ローブ (約 17Hz) + LFO ぶれを通す広さ。
          # E5=659Hz と A5=880Hz は Drone 倍音 (660Hz=220×3 / 880Hz=440×2) と重なるので、
          # GRAIN 単独の指標としては C#5/F#5 のほうが clean。ただし「候補帯群の集約」での判定なので
          # 全候補を測る。
          C5_L=$(measure_max_in_band 554 60 c0)
          C5_R=$(measure_max_in_band 554 60 c1)
          E5_L=$(measure_max_in_band 659 60 c0)
          E5_R=$(measure_max_in_band 659 60 c1)
          F5_L=$(measure_max_in_band 740 60 c0)
          F5_R=$(measure_max_in_band 740 60 c1)
          A5_L=$(measure_max_in_band 880 60 c0)
          A5_R=$(measure_max_in_band 880 60 c1)
          REF_L=$(measure_max_in_band 1200 60 c0)
          REF_R=$(measure_max_in_band 1200 60 c1)

          # L/R それぞれで「候補 4 帯の MAX」と「Drone 倍音と被らない 2 帯 (C#5/F#5) の各最大」を出す。
          # max-of-4 は「どの候補が選ばれても拾える」性質を測る。
          # CLEAN_MAX (C#5/F#5 の max) は参照帯と「1 帯 vs 1 帯」で比較するため、
          # 単純な和の比較で生じる「無信号でも 2 帯合計 / 1 帯参照は期待値として >1 になりやすい」
          # 罠を回避する (Codex 再レビュー指摘)。
          MAX_OF4_L=$(awk -v a="$C5_L" -v b="$E5_L" -v c="$F5_L" -v d="$A5_L" \
            'BEGIN { m=a; if (b+0>m) m=b; if (c+0>m) m=c; if (d+0>m) m=d; print m+0 }')
          MAX_OF4_R=$(awk -v a="$C5_R" -v b="$E5_R" -v c="$F5_R" -v d="$A5_R" \
            'BEGIN { m=a; if (b+0>m) m=b; if (c+0>m) m=c; if (d+0>m) m=d; print m+0 }')
          CLEAN_MAX_L=$(awk -v a="$C5_L" -v b="$F5_L" 'BEGIN { m=a; if (b+0>m) m=b; print m+0 }')
          CLEAN_MAX_R=$(awk -v a="$C5_R" -v b="$F5_R" 'BEGIN { m=a; if (b+0>m) m=b; print m+0 }')
          echo "grain bands L (C#5/E5/F#5/A5): $C5_L $E5_L $F5_L $A5_L  | max-of-4=$MAX_OF4_L clean-max(C#5/F#5)=$CLEAN_MAX_L"
          echo "grain bands R (C#5/E5/F#5/A5): $C5_R $E5_R $F5_R $A5_R  | max-of-4=$MAX_OF4_R clean-max(C#5/F#5)=$CLEAN_MAX_R"
          echo "ref band 1200Hz: L=$REF_L R=$REF_R"

          FAIL=0
          # GRAIN trigger は L/R 独立かつ平均 1/sec/ch なので、9 秒の steady 区間内で
          # L/R それぞれ最低数発は発火している想定。候補 4 帯のうち最大のものが
          # 200 (s16 で 0.006、定常 noise + drone harmonics 漏れ超過水準) を超えていれば
          # 「どの pitch が選ばれても 1 個は出ている」確証になる。
          if [ "${MAX_OF4_L:-0}" -lt 200 ]; then
            echo "ERROR: L 候補帯 (C#5/E5/F#5/A5) 中の最大 MAX が低すぎる (実際 $MAX_OF4_L, 期待 >= 200)。GRAIN trigger が L 側で観測できていない可能性。"
            FAIL=1
          fi
          if [ "${MAX_OF4_R:-0}" -lt 200 ]; then
            echo "ERROR: R 候補帯 (C#5/E5/F#5/A5) 中の最大 MAX が低すぎる (実際 $MAX_OF4_R, 期待 >= 200)。GRAIN trigger が R 側で観測できていない可能性。"
            FAIL=1
          fi
          # C#5 または F#5 (Drone 倍音と被らない 2 帯のうちのいずれか) の MAX が
          # 1200Hz 参照帯 MAX より明確に大きい (1.5x 以上) ことを要求。
          # 「帯域数 1 vs 1」の比較なので、無信号での偽陽性が発生しない。
          # L/R 両 ch で同条件を満たすことでステレオ独立 trigger の検査も兼ねる。
          GRAIN_VS_REF_L=$(awk -v g="$CLEAN_MAX_L" -v r="$REF_L" \
            'BEGIN { print (r+0 > 0 && g/r >= 1.5) ? 1 : 0 }')
          if [ "$GRAIN_VS_REF_L" != "1" ]; then
            RATIO=$(awk -v g="$CLEAN_MAX_L" -v r="$REF_L" \
              'BEGIN { if (r+0 > 0) printf "%.2f", g/r; else print "n/a" }')
            echo "ERROR: L チャネル max(C#5, F#5) / 1200Hz 参照帯比が小さすぎる (実際 $RATIO, 期待 >= 1.5)。GRAIN が選択的に clean 帯に出ている証拠が不足。"
            FAIL=1
          fi
          GRAIN_VS_REF_R=$(awk -v g="$CLEAN_MAX_R" -v r="$REF_R" \
            'BEGIN { print (r+0 > 0 && g/r >= 1.5) ? 1 : 0 }')
          if [ "$GRAIN_VS_REF_R" != "1" ]; then
            RATIO=$(awk -v g="$CLEAN_MAX_R" -v r="$REF_R" \
              'BEGIN { if (r+0 > 0) printf "%.2f", g/r; else print "n/a" }')
            echo "ERROR: R チャネル max(C#5, F#5) / 1200Hz 参照帯比が小さすぎる (実際 $RATIO, 期待 >= 1.5)。GRAIN が選択的に clean 帯に出ている証拠が不足。"
            FAIL=1
          fi
          if [ "$FAIL" = "1" ]; then
            exit 1
          fi
          echo "OK: 候補 4 帯 (C#5/E5/F#5/A5) で GRAIN trigger が L/R 両 ch で観測 + max(C#5, F#5) が参照帯比 1.5x 以上 (Task 19)。"

      - name: Shutdown simulator
        script: |
          xcrun simctl shutdown "$DEVICE_UDID" || true

    artifacts:
      - artifacts/*.wav
      - artifacts/*.mp4
      - artifacts/*.png
      - artifacts/*.log
      - artifacts/crash/**/*
      - build/Logs/**/*.log
